workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.acanfora.yourlibrary"
        TEAM_ID: "8X7KQVH29D"
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --save || \
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --save
          keychain add-certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          xcode-project use-profiles

      - name: Build IPA
        script: |
          # Find the provisioning profile installed by xcode-project use-profiles
          PROFILE_UUID=$(
            for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
              info=$(security cms -D -i "$f" 2>/dev/null)
              bundle=$(echo "$info" | plutil -extract Entitlements.application-identifier raw - 2>/dev/null)
              uuid=$(echo "$info" | plutil -extract UUID raw - 2>/dev/null)
              if [[ "$bundle" == *"$BUNDLE_ID"* ]] && [ -n "$uuid" ]; then
                echo "$uuid"
                break
              fi
            done
          )
          if [ -z "$PROFILE_UUID" ]; then
            echo "Error: No provisioning profile found for bundle ID: $BUNDLE_ID"
            ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
            exit 1
          fi
          echo "Using provisioning profile UUID: $PROFILE_UUID"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "/tmp/App.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            COMPILER_INDEX_STORE_ENABLE=NO

          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_UUID" /tmp/ExportOptions.plist

          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "/tmp/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
