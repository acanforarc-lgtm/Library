workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.acanfora.yourlibrary
      groups:
        - api_keys
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.acanfora.yourlibrary"
        TEAM_ID: "8X7KQVH29D"
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Inject API key
        script: sed -i '' "s/__GOOGLE_BOOKS_API_KEY__/$GOOGLE_BOOKS_API_KEY/g" index.html

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Setting build number to $BUILD_NUMBER (git commit count)"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" ios/App/App.xcodeproj/project.pbxproj
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
