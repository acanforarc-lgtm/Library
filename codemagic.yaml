workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.acanfora.yourlibrary
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.acanfora.yourlibrary"
        TEAM_ID: "8X7KQVH29D"
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" --platform=IOS 2>/dev/null || echo 7)
          NEXT_BUILD=$((LATEST + 1))
          echo "Setting build number to $NEXT_BUILD (previous was $LATEST)"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --xcargs "CURRENT_PROJECT_VERSION=$NEXT_BUILD"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
