workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.acanfora.yourlibrary"
        TEAM_ID: "8X7KQVH29D"
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          export CERTIFICATE_PRIVATE_KEY=$(openssl genrsa 2048)
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --save
          keychain add-certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "/tmp/App.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

          cat > /tmp/ExportOptions.plist << PLIST_EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>app-store-connect</string>
    <key>teamID</key>
    <string>$TEAM_ID</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>provisioningProfiles</key>
    <dict>
        <key>$BUNDLE_ID</key>
        <string>$(security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision | plutil -extract UUID raw -)</string>
    </dict>
</dict>
</plist>
PLIST_EOF

          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "/tmp/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
