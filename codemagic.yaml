workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.acanfora.yourlibrary"
        TEAM_ID: "8X7KQVH29D"
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save || \
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --save
          keychain add-certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "/tmp/App.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

          PROFILE_UUID=$(security cms -D -i "/tmp/App.xcarchive/Products/Applications/App.app/embedded.mobileprovision" | plutil -extract UUID raw -)
          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_UUID" /tmp/ExportOptions.plist

          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "/tmp/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
