            // Update user-facing book data (status, rating, notes) in local state.
            // These fields live under book.userData and are read throughout the UI.
            const updateBookUserData = (bookId, field, value) => {

                });

                setBooks(prev => prev.map(b => b.id === bookId ? merge(b) : b));

                if (shelfBookData?.id === bookId) setShelfBookData(prev => merge(prev));
                if (bookInfoData?.id === bookId) setBookInfoData(prev => merge(prev));
            };

            // ==========================================
            // BARCODE SCANNER FUNCTIONS
            // ==========================================
            
            // Start scanner
            const startScanner = async () => {
                setShowScanner(true);
                setScannerStatus('initializing');
                
                try {
                    // Request camera permission
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } // Use back camera on mobile
                    });
                    
                    scannerStreamRef.current = stream;
                    
                    // Wait for video element to be ready
                    setTimeout(() => {
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;

                    }, 100);
                    
                } catch (error) {
                    console.error('Camera access denied:', error);
                    setScannerStatus('error');
                    showMessage('❌ Camera access denied. Please enable camera permissions.');
                }
            };

            // Initialize Quagga barcode scanner
            const initQuagga = () => {
                if (!videoRef.current) return;
                
                Quagga.init({
                    inputStream: {
                        name: "Live",
                        type: "LiveStream",
                        target: videoRef.current,
                        constraints: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        area: { // Scan only center area (faster!)
                            top: "25%",
                            right: "10%",
                            left: "10%",
                            bottom: "25%"
                        }
                    },
                    frequency: 10, // Scan every frame (max speed!)
                    decoder: {
                        readers: ["ean_reader"], // Only EAN-13 (ISBN), remove EAN-8 for speed
                        multiple: false // Stop after first detection
                    },
                    locate: true,
                    numOfWorkers: navigator.hardwareConcurrency || 4, // Use all CPU cores!
                    debug: false
                }, (err) => {
                    if (err) {
                        console.error('Quagga init error:', err);
                        setScannerStatus('error');
                        return;
                    }
                    Quagga.start();
                    setScannerStatus('scanning');
                    scanningStartTime.current = Date.now();
                    
                    // Listen for barcode detection
                    Quagga.onDetected(onBarcodeDetected);
                });

            // Handle barcode detection
            // Handle barcode detection - OPTIMIZED FOR SPEED!
            const onBarcodeDetected = (result) => {
                if (result && result.codeResult && result.codeResult.code) {
                    const code = result.codeResult.code;
                    
                    console.log('Barcode detected:', code);
                    
                    // Validate ISBN format - ISBN-13 starts with 978/979
                    const isValidISBN13 = /^(978|979)\d{10}$/.test(code);
                    
                    if (isValidISBN13) {
                        // Prevent duplicate scans
                        if (scannedISBN === code) {
                            console.log('Duplicate scan, ignoring');
                            return;
                        }
                        
                        console.log('Valid ISBN-13 detected!');
                        
                        // IMMEDIATELY stop scanning and process
                        Quagga.stop();
                        Quagga.offDetected(onBarcodeDetected); // Remove listener
                        
                        setScannedISBN(code);
                        setScannerStatus('processing');
                        
                        // Vibrate for haptic feedback (if supported)
                        if (navigator.vibrate) {
                            navigator.vibrate(50);
                        }
                        
                        showMessage(`📖 ISBN: ${code}`);
                        fetchBookByISBN(code);
                    } else {
                        console.log('Not a valid ISBN-13, continuing...');
                    }
                }
            };

            // Manual capture photo and OCR
            // STEPS 3 & 4: Manual capture with improved OCR
            const captureAndScanPhoto = async () => {
                if (!videoRef.current) return;
                
                setScannerStatus('processing');
                showMessage('📸 Capturing and analyzing...');
                
                try {
                    // Create canvas and capture frame
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    // Draw the image
                    ctx.drawImage(videoRef.current, 0, 0);
                    
                    // STEP 4: Image preprocessing for better OCR
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    // Enhance contrast (makes text clearer)
                    const contrast = 1.5;
                    const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                    
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = factor * (data[i] - 128) + 128;         // red
                        data[i + 1] = factor * (data[i + 1] - 128) + 128; // green
                        data[i + 2] = factor * (data[i + 2] - 128) + 128; // blue
                    }
                    ctx.putImageData(imageData, 0, 0);
                    
                    // Convert to blob for Tesseract
                    canvas.toBlob(async (blob) => {
                        try {
                            showMessage('🔍 Running OCR...');
                            console.log('📸 Starting OCR on captured image...');
                            
                            // Use Tesseract OCR
                            const result = await Tesseract.recognize(blob, 'eng', {
                                logger: m => {
                                    if (m.status === 'recognizing text') {
                                        console.log(`OCR Progress: ${Math.round(m.progress * 100)}%`);
                                    }
                                }
                            });
                            const text = result.data.text;
                            
                            console.log('📝 OCR Text:', text);
                            
                            // STEP 4: Multiple ISBN pattern matching
                            const patterns = [
                                /ISBN[:\s-]*(\d{13})/i,           // "ISBN: 9781234567890"
                                /ISBN[:\s-]*(\d{10})/i,           // "ISBN: 1234567890"
                                /(\d{3}[-\s]?\d{1}[-\s]?\d{5}[-\s]?\d{3}[-\s]?\d)/,  // "978-1-12345-123-4"
                                /(\d{13})/,                       // "9781234567890"
                                /(\d{10})/                        // "1234567890"
                            ];
                            
                            let isbn = null;
                            for (const pattern of patterns) {
                                const match = text.match(pattern);
                                if (match) {
                                    // Extract just digits
                                    isbn = (match[1] || match[0]).replace(/\D/g, '');
                                    if (isbn.length === 10 || isbn.length === 13) {
                                        console.log('✅ Found ISBN via pattern:', pattern, '→', isbn);
                                        break;
                                    }
                                }
                            }
                            
                            if (isbn) {
                                showMessage(`✅ Found ISBN: ${isbn}`);
                                setScannedISBN(isbn);
                                fetchBookByISBN(isbn);
                            } else {
                                console.warn('❌ No ISBN found in OCR text');
                                showMessage('❌ No ISBN detected. Try positioning the book better.');
                                setScannerStatus('scanning');
                                // Restart barcode scanning
                                if (Quagga) {
                                    Quagga.onDetected(onBarcodeDetected);
                                    Quagga.start();
                                }
                            }
                        } catch (error) {
                            console.error('❌ OCR error:', error);
                            showMessage('❌ OCR failed. Try again or use barcode mode.');
                            setScannerStatus('scanning');
                            // Restart barcode scanning
                            if (Quagga) {
                                Quagga.onDetected(onBarcodeDetected);
                                Quagga.start();
                            }
                        }
                    }, 'image/png');

            // Fetch book data by ISBN
            const fetchBookByISBN = async (isbn) => {

                        }

                                    cover: olBook.cover?.medium || olBook.cover?.large || null,

                                    pageCount: olBook.number_of_pages,
                                    description: olBook.excerpts?.[0]?.text || 'No description available.'
                                };
                            }
                        }

                        setShowScannedBookPopup(true);

                        showMessage(`✅ Found: ${bookData.title}`);

                        setTimeout(() => { resetScannerForNext(); }, 2000);
                    }
                } catch (error) {
                    console.error('API error:', error);
                    showMessage(`❌ Network error: ${error.message}. Check connection.`);
                    setTimeout(() => { resetScannerForNext(); }, 2000);
                }
            };

            // Add scanned book and scan next - SUPABASE v7.1

                    await Quagga.init({

                            name: "Live",
                            type: "LiveStream",
                            target: videoRef.current, // USE REF, NOT querySelector!
                            constraints: {
                                facingMode: "environment", // Use back camera on mobile
                                aspectRatio: { min: 1, max: 2 }
                            }
                        },
                        decoder: {
                            readers: ["ean_reader", "ean_8_reader"] // ISBN barcodes are EAN-13
                        },
                        locate: true
                    }, (err) => {
                        if (err) {
                            console.error('❌ Quagga initialization failed:', err);
                            setScannerStatus('❌ Camera access denied or unavailable');
                            return;
                        }
                        
                        console.log('✅ Quagga initialized successfully');
                        
                        // Store the stream

                            scannerStreamRef.current = videoRef.current.srcObject;
                            console.log('✅ Stream stored');
                        }
                        
                        Quagga.start();
                        scannerInitialized.current = true;
                        setScannerStatus('📷 Point camera at barcode...');
                    });

                    // Listen for detected barcodes
                    Quagga.onDetected(async (result) => {
                        if (result && result.codeResult && result.codeResult.code) {
                            const code = result.codeResult.code;
                            
                            // Validate ISBN format (13 digits for ISBN-13, 10 for ISBN-10)
                            if (code.length === 13 || code.length === 10) {
                                setScannerStatus(`✅ Detected: ${code}`);
                                setScannedISBN(code);
                                
                                // Vibrate if available

                                    navigator.vibrate(200);
                                }
                                
                                // Pause scanning while processing
                                Quagga.pause();
                                
                                // Fetch book and show add dialog

                                // Resume scanning for next book
                                setTimeout(() => {
                                    Quagga.start();
                                    setScannerStatus('📷 Ready for next book...');
                                    setScannedISBN(null);
                                }, 1000);
                            }
                        }
                    });

                    console.error('Scanner error:', error);
                    setScannerStatus('❌ Error starting scanner');
                }
            };

            const fetchAndShowBook = async (isbn) => {

                                description: book.description || 'No description available.'
                            };
                        }
                    }

                    // Fallback to OpenLibrary if Google Books failed or rate limited
                    if (!bookData) {

                        const olRes = await fetch(
                            `https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`

                                                    onClick={() => setGroupDetailTab(t)}
                                                >
                                                    {t === 'chats'   && `💬 Chats (${activeChats.length})`}
                                                    {t === 'members' && `👥 Members (${members.filter(m => !m.banned_at).length})`}
                                                    {t === 'shelves' && `📚 Shelves (${shelves.length})`}
                                                    {t === 'roles'   && `🎖 Roles`}
                                                </button>
                                            ))}
                                        </div>

                                        {/* ── Tab: Chats ── */}
                                        {groupDetailTab === 'chats' && (
                                            <div>
                                                {canStartDiscussion && (
                                                    <button className="groups-create-btn" style={{marginBottom:'0.75rem'}} onClick={() => setShowAddChat(true)}>
                                                        + New Discussion
                                                    </button>
                                                )}
                                                {activeChats.length === 0 ? (
                                                    <div className="groups-empty">
                                                        <div className="groups-empty-icon">💬</div>
                                                        <div className="groups-empty-text">No discussions yet</div>
                                                        {canStartDiscussion && <div className="groups-empty-sub">Start the first one!</div>}
                                                    </div>
                                                ) : (
                                                    <div className="chat-channels">
                                                        {/* Group by tier for public groups */}
                                                        {group.type === 'public'
                                                            ? [1,2,3].map(tier => {
                                                                const tierChats = activeChats.filter(c => c.tier === tier);
                                                                if (!tierChats.length) return null;
                                                                const ti = TIER_INFO[tier];
                                                                return (
                                                                    <div key={tier}>
                                                                        <div style={{fontWeight:700, color:'#8b6f47', fontSize:'0.82rem', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:'0.4rem', marginTop:'0.5rem'}}>
                                                                            {ti.icon} {ti.label}
                                                                        </div>
                                                                        {tierChats
                                                                            .slice()
                                                                            .sort((a,b) => b.rating - a.rating)
                                                                            .map(chat => (
                                                                            <div key={chat.id} className="chat-channel-card" onClick={() => openGroupChat(group, chat)}>
                                                                                <div className="chat-channel-info">
                                                                                    <div className="chat-channel-title">{chat.title}</div>
                                                                                    <div className="chat-channel-meta">
                                                                                        <span className={`tier-badge ${ti.cls}`}>{ti.label}</span>
                                                                                        <span className="chat-rating-stars">{formatStars(chat.rating, chat.rating_count)}</span>
                                                                                    </div>
                                                                                </div>
                                                                                <span style={{color:'#c9a87c', fontSize:'1.1rem'}}>›</span>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                );
                                                            })
                                                            : activeChats.map(chat => {
                                                                const ti = TIER_INFO[chat.tier] || TIER_INFO[1];
                                                                return (
                                                                    <div key={chat.id} className="chat-channel-card" onClick={() => openGroupChat(group, chat)}>
                                                                        <div className="chat-channel-info">
                                                                            <div className="chat-channel-title">{chat.title}</div>
                                                                            <div className="chat-channel-meta">
                                                                                <span className={`tier-badge ${ti.cls}`}>{ti.label}</span>
                                                                            </div>
                                                                        </div>
                                                                        <span style={{color:'#c9a87c', fontSize:'1.1rem'}}>›</span>
                                                                    </div>
                                                                );
                                                            })
                                                        }
                                                    </div>
                                                )}

                                                {/* Add chat modal */}
                                                {showAddChat && (
                                                    <div className="create-group-overlay" onClick={() => setShowAddChat(false)}>
                                                        <div className="create-group-panel" onClick={e => e.stopPropagation()}>
                                                            <div className="create-group-title">New Discussion Channel</div>
                                                            <div className="cg-field">
                                                                <label className="cg-label">Title</label>
                                                                <input className="cg-input" value={addChatForm.title} onChange={e => setAddChatForm(f => ({...f, title: e.target.value}))} placeholder="e.g. Chapter 1–5 thoughts" />
                                                            </div>
                                                            {group.type === 'public' && (
                                                                <div className="cg-field">
                                                                    <label className="cg-label">Tier</label>
                                                                    <select className="cg-input" value={addChatForm.tier} onChange={e => setAddChatForm(f => ({...f, tier: Number(e.target.value)}))}>
                                                                        <option value={1}>📖 Tier 1 — General (open to all)</option>
                                                                        <option value={2}>📚 Tier 2 — Intermediate (readers of the book)</option>
                                                                        <option value={3}>🔍 Tier 3 — Deep Dive (engaged readers only)</option>
                                                                    </select>
                                                                </div>
                                                            )}
                                                            <div className="cg-actions">
                                                                <button className="cg-btn-secondary" onClick={() => setShowAddChat(false)}>Cancel</button>
                                                                <button className="cg-btn-primary" disabled={!addChatForm.title.trim()} onClick={() => createGroupChat(group)}>Create</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* ── Tab: Members ── */}
                                        {groupDetailTab === 'members' && (
                                            <div>
                                                {canAddMember && (
                                                    <div style={{marginBottom:'0.75rem', display:'flex', gap:'0.5rem'}}>
                                                        <input
                                                            className="cg-input"
                                                            placeholder="User ID to add…"
                                                            id="addMemberInput"
                                                            style={{flex:1}}
                                                        />
                                                        <button
                                                            className="groups-create-btn"
                                                            onClick={() => {
                                                                const v = document.getElementById('addMemberInput').value.trim();
                                                                if (v) addMemberToGroup(group, v);
                                                            }}
                                                        >Add</button>
                                                    </div>
                                                )}
                                                <div className="group-members-list">
                                                    {members.map(m => {
                                                        const isSelf = (m.user_id || m.userId) === currentUser.id;
                                                        const role = (group.roles || []).find(r => r.id === (m.role_id || m.roleId));
                                                        const rt = role?.role_type || role?.roleType || 'member';
                                                        const targetId = m.user_id || m.userId;
                                                        return (
                                                            <div key={m.id} className="group-member-row" style={{opacity: m.banned_at ? 0.55 : 1}}>
                                                                <div className="group-member-avatar">
                                                                    {(m.userName || m.user_name || 'U').charAt(0).toUpperCase()}
                                                                </div>
                                                                <div style={{flex:1}}>
                                                                    <div className="group-member-name">
                                                                        {m.userName || m.user_name || targetId}
                                                                        {isSelf && <span style={{fontSize:'0.72rem', color:'#8b6f47', marginLeft:'0.35rem'}}>(you)</span>}
                                                                    </div>
                                                                    <div className="group-member-role" style={{display:'flex', alignItems:'center', gap:'0.35rem'}}>
                                                                        <span style={{width:8, height:8, borderRadius:'50%', background: ROLE_COLORS[rt] || '#888', display:'inline-block'}}></span>
                                                                        {ROLE_LABELS[rt] || role?.name || 'Member'}
                                                                        {m.banned_at && <span className="banned-badge">BANNED</span>}
                                                                    </div>
                                                                </div>
                                                                {!isSelf && (
                                                                    <div className="group-member-actions">
                                                                        {hasPriv(group, 'report_member') && (
                                                                            <button className="group-member-btn report" onClick={() => reportMember(group, targetId)}>Report</button>
                                                                        )}
                                                                        {amMod && group.ownerId !== targetId && (
                                                                            <>
                                                                                {hasPriv(group, 'ban_member') && (
                                                                                    <button
                                                                                        className="group-member-btn ban"
                                                                                        onClick={() => banMember(group, targetId, !m.banned_at)}
                                                                                    >{m.banned_at ? 'Unban' : 'Ban'}</button>
                                                                                )}
                                                                                {hasPriv(group, 'remove_member') && !m.banned_at && (
                                                                                    <button className="group-member-btn remove" onClick={() => removeMember(group, targetId)}>Remove</button>
                                                                                )}
                                                                            </>
                                                                        )}
                                                                        {hasPriv(group, 'assign_role') && !m.banned_at && (
                                                                            <button
                                                                                className="group-member-btn"
                                                                                style={{borderColor:'#8b6f47', color:'#8b6f47'}}
                                                                                onClick={() => {
                                                                                    const roleId = window.prompt('Enter role ID to request for this user:\n' + roles.map(r => `${r.id} — ${r.name}`).join('\n'));
                                                                                    if (roleId) requestRoleChange(group, targetId, roleId);
                                                                                }}
                                                                            >Role</button>
                                                                        )}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* ── Tab: Shelves ── */}
                                        {groupDetailTab === 'shelves' && (
                                            <div>
                                                {canManageBooks && shelves.length < group.max_shelves && (
                                                    <button className="groups-create-btn" style={{marginBottom:'0.75rem'}} onClick={() => setShowAddGroupShelf(true)}>
                                                        + Add Shelf ({shelves.length}/{group.max_shelves})
                                                    </button>
                                                )}
                                                {shelves.length === 0 ? (
                                                    <div className="groups-empty">
                                                        <div className="groups-empty-icon">📚</div>
                                                        <div className="groups-empty-text">No shelves yet</div>
                                                    </div>
                                                ) : (
                                                    <div className="group-shelves-list">
                                                        {shelves.map(shelf => (
                                                            <div key={shelf.id} className="group-shelf-row">
                                                                <div className="group-shelf-title">{shelf.title}</div>
                                                                <div className="group-shelf-books">
                                                                    {(shelf.books || []).length === 0
                                                                        ? <span style={{fontSize:'0.8rem', color:'#aaa'}}>No books yet</span>
                                                                        : (shelf.books || []).map(b => (
                                                                            <span key={b.id} className="group-shelf-book-chip">{b.title || b.id}</span>
                                                                        ))
                                                                    }
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                {showAddGroupShelf && (
                                                    <div className="create-group-overlay" onClick={() => setShowAddGroupShelf(false)}>
                                                        <div className="create-group-panel" onClick={e => e.stopPropagation()}>
                                                            <div className="create-group-title">Add Shelf</div>
                                                            <div className="cg-field">
                                                                <label className="cg-label">Shelf Name</label>
                                                                <input className="cg-input" value={addGroupShelfTitle} onChange={e => setAddGroupShelfTitle(e.target.value)} placeholder="e.g. Must Reads" />
                                                            </div>
                                                            <div className="cg-actions">
                                                                <button className="cg-btn-secondary" onClick={() => setShowAddGroupShelf(false)}>Cancel</button>
                                                                <button className="cg-btn-primary" disabled={!addGroupShelfTitle.trim()} onClick={() => addGroupShelf(group)}>Add</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* ── Tab: Roles ── */}
                                        {groupDetailTab === 'roles' && (
                                            <div>
                                                {/* Pending role requests (admin only) */}
                                                {amAdmin && pendingRoleRequests.length > 0 && (
                                                    <div style={{marginBottom:'1rem'}}>
                                                        <div style={{fontWeight:700, color:'#3d2817', marginBottom:'0.5rem'}}>Pending Role Requests</div>
                                                        {pendingRoleRequests.map(req => (
                                                            <div key={req.id} style={{background:'#fff8e1', border:'1.5px solid #ffe082', borderRadius:8, padding:'0.65rem 0.9rem', marginBottom:'0.4rem', display:'flex', alignItems:'center', gap:'0.75rem'}}>
                                                                <div style={{flex:1, fontSize:'0.85rem', color:'#3d2817'}}>
                                                                    Assign <strong>{req.role?.name || req.requested_role_id}</strong> to user
                                                                    <span style={{color:'#8b6f47'}}> {req.target_user_id}</span>
                                                                </div>
                                                                <button style={{background:'#2d6a4f', color:'#fff', border:'none', borderRadius:6, padding:'0.3rem 0.7rem', cursor:'pointer', fontWeight:700, fontSize:'0.8rem'}} onClick={() => reviewRoleRequest(group, req.id, true)}>✓ Approve</button>
                                                                <button style={{background:'#c0392b', color:'#fff', border:'none', borderRadius:6, padding:'0.3rem 0.7rem', cursor:'pointer', fontWeight:700, fontSize:'0.8rem'}} onClick={() => reviewRoleRequest(group, req.id, false)}>✗ Reject</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                {amAdmin && group.type === 'public' && (
                                                    <div style={{fontSize:'0.8rem', color:'#8b6f47', marginBottom:'0.5rem'}}>
                                                        Custom roles: {roles.filter(r => (r.role_type||r.roleType) === 'custom').length}/6
                                                    </div>
                                                )}
                                                {amAdmin && (
                                                    <button className="groups-create-btn" style={{marginBottom:'0.75rem'}} onClick={() => setShowAddRole(true)}>
                                                        + Add Custom Role
                                                    </button>
                                                )}

                                                <div className="group-roles-list">
                                                    {roles.map(role => {
                                                        const rt = role.role_type || role.roleType;
                                                        const isBuiltIn = rt !== 'custom';
                                                        return (
                                                            <div key={role.id} className="group-role-row">
                                                                <div className="group-role-header">
                                                                    <span className="role-type-dot" style={{background: ROLE_COLORS[rt] || '#888'}}></span>
                                                                    <span className="group-role-name">{role.name}</span>
                                                                    <span style={{fontSize:'0.72rem', color:'#8b6f47'}}>{ROLE_LABELS[rt] || 'Custom'}</span>
                                                                    {isBuiltIn && <span style={{fontSize:'0.68rem', background:'#eee', color:'#888', borderRadius:4, padding:'0.05rem 0.35rem', marginLeft:'auto'}}>built-in</span>}
                                                                </div>
                                                                <div className="group-role-privs">
                                                                    {(role.privileges || []).length === 0 && rt !== 'admin'
                                                                        ? <span style={{fontSize:'0.75rem', color:'#aaa'}}>No extra privileges</span>
                                                                        : rt === 'admin'
                                                                            ? <span className="priv-chip">All privileges</span>
                                                                            : (role.privileges || []).map(p => (
                                                                                <span key={p} className="priv-chip">{PRIV_LABELS[p] || p}</span>
                                                                            ))
                                                                    }
                                                                </div>
                                                                {amAdmin && rt !== 'admin' && (
                                                                    <div style={{marginTop:'0.5rem'}}>
                                                                        <div style={{fontSize:'0.78rem', color:'#8b6f47', marginBottom:'0.3rem'}}>Edit privileges:</div>
                                                                        <div className="priv-grid">
                                                                            {ALL_PRIVILEGES.map(priv => (
                                                                                <label key={priv} className="priv-check">
                                                                                    <input
                                                                                        type="checkbox"
                                                                                        checked={(role.privileges || []).includes(priv)}
                                                                                        onChange={e => {
                                                                                            const current = role.privileges || [];
                                                                                            const next = e.target.checked
                                                                                                ? [...current, priv]
                                                                                                : current.filter(p => p !== priv);
                                                                                            updateRolePrivileges(group, role, next);
                                                                                        }}
                                                                                    />
                                                                                    {PRIV_LABELS[priv]}
                                                                                </label>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                {/* Add role modal */}
                                                {showAddRole && (
                                                    <div className="create-group-overlay" onClick={() => setShowAddRole(false)}>
                                                        <div className="create-group-panel" onClick={e => e.stopPropagation()}>
                                                            <div className="create-group-title">Add Custom Role</div>
                                                            <div className="cg-field">
                                                                <label className="cg-label">Role Name</label>
                                                                <input className="cg-input" value={addRoleForm.name} onChange={e => setAddRoleForm(f => ({...f, name: e.target.value}))} placeholder="e.g. Curator" />
                                                            </div>
                                                            <div className="cg-field">
                                                                <label className="cg-label">Privileges</label>
                                                                <div className="priv-grid">
                                                                    {ALL_PRIVILEGES.map(priv => (
                                                                        <label key={priv} className="priv-check">
                                                                            <input
                                                                                type="checkbox"
                                                                                checked={addRoleForm.privileges.includes(priv)}
                                                                                onChange={e => {
                                                                                    const next = e.target.checked
                                                                                        ? [...addRoleForm.privileges, priv]
                                                                                        : addRoleForm.privileges.filter(p => p !== priv);
                                                                                    setAddRoleForm(f => ({...f, privileges: next}));
                                                                                }}
                                                                            />
                                                                            {PRIV_LABELS[priv]}
                                                                        </label>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            <div className="cg-actions">
                                                                <button className="cg-btn-secondary" onClick={() => setShowAddRole(false)}>Cancel</button>
                                                                <button className="cg-btn-primary" disabled={!addRoleForm.name.trim()} onClick={() => addGroupRole(group)}>Create</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            }

                            /* ── VIEW: Groups list ──────────────────────────── */
                            return (
                                <div className="groups-container">
                                    {/* Error banner */}
                                    {groupsError && (
                                        <div style={{background:'#fce4ec', border:'1.5px solid #f48fb1', borderRadius:8, padding:'0.75rem 1rem', color:'#880e4f', fontSize:'0.88rem'}}>
                                            ⚠️ {groupsError}
                                        </div>
                                    )}

                                    {/* Book community filter */}
                                    {communityBookIsbn && (
                                        <div style={{marginBottom:'1rem'}}>
                                            <div className="groups-section-header">
                                                <div className="groups-section-title" style={{fontSize:'0.95rem'}}>
                                                    📖 "{communityBookTitle}"
                                                </div>
                                                <div style={{display:'flex', gap:'0.5rem', alignItems:'center'}}>
                                                    <button
                                                        className="groups-create-btn"
                                                        onClick={() => {
                                                            setCreateGroupForm(f => ({...f, relatedBookId: communityBookIsbn}));
                                                            setShowCreateGroup(true);
                                                            setCreateGroupStep(1);
                                                        }}
                                                    >+ Start Group</button>
                                                    <button
                                                        style={{background:'none', border:'1.5px solid #c0a882', color:'#8b6f47', borderRadius:6, padding:'0.3rem 0.65rem', fontSize:'0.8rem', cursor:'pointer'}}
                                                        onClick={() => { setCommunityBookIsbn(null); setCommunityBookTitle(''); setBookGroups([]); }}
                                                    >✕ Clear</button>
                                                </div>
                                            </div>
                                            {bookGroupsLoading ? (
                                                <div style={{color:'#8b6f47', fontSize:'0.85rem', padding:'0.5rem 0'}}>Loading…</div>
                                            ) : bookGroups.length === 0 ? (
                                                <div className="groups-empty" style={{padding:'1rem 0'}}>
                                                    <div className="groups-empty-icon" style={{fontSize:'1.5rem'}}>💬</div>
                                                    <div className="groups-empty-text">No groups for this book yet</div>
                                                    <div className="groups-empty-sub">Start the first one!</div>
                                                </div>
                                            ) : (
                                                <div className="groups-grid">
                                                    {bookGroups.map(g => {
                                                        const amMember = isMemberOfGroup(g);
                                                        const myRole = myGroupRole(g);
                                                        const rt = myRole?.role_type || myRole?.roleType || 'member';
                                                        return (
                                                            <div key={g.id} className="group-card">
                                                                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.3rem'}}>
                                                                    <span className={`group-type-badge ${g.type}`}>{g.type}</span>
                                                                    {amMember && <span style={{fontSize:'0.72rem', color: ROLE_COLORS[rt], fontWeight:700}}>{ROLE_LABELS[rt] || 'Member'}</span>}
                                                                </div>
                                                                <div className="group-card-title">{g.title}</div>
                                                                <div className="group-card-meta">
                                                                    <span>👥 {(g.members||[]).filter(m=>!m.banned_at).length}/{g.max_members}</span>
                                                                    <span>💬 {(g.chats||[]).filter(c=>c.is_active).length} chats</span>
                                                                </div>
                                                                <div style={{marginTop:'0.6rem', display:'flex', gap:'0.5rem'}}>
                                                                    {!amMember && (
                                                                        <button className="groups-create-btn" style={{fontSize:'0.82rem', padding:'0.4rem 0.85rem'}} onClick={() => joinGroup(g)}>Join</button>
                                                                    )}
                                                                    <button className="cg-btn-secondary" style={{fontSize:'0.82rem', padding:'0.4rem 0.85rem'}} onClick={() => openGroup(g)}>
                                                                        {amMember ? 'Open' : 'Browse'}
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                            <div style={{borderBottom:'1px solid #e0c9a6', margin:'1rem 0'}} />
                                        </div>
                                    )}

                                    {/* My groups */}
                                    <div>
                                        <div className="groups-section-header">
                                            <div className="groups-section-title">My Groups</div>
                                            <button className="groups-create-btn" onClick={() => { setShowCreateGroup(true); setCreateGroupStep(1); }}>
                                                + Create Group
                                            </button>
                                        </div>
                                        {groupsLoading ? (
                                            <div style={{color:'#8b6f47', padding:'1.5rem 0'}}>Loading…</div>
                                        ) : myGroups.length === 0 ? (
                                            <div className="groups-empty">
                                                <div className="groups-empty-icon">👥</div>
                                                <div className="groups-empty-text">You're not in any groups yet</div>
                                                <div className="groups-empty-sub">Create one or join a public group below</div>
                                            </div>
                                        ) : (
                                            <div className="groups-grid">
                                                {myGroups.map(g => {
                                                    const myRole = myGroupRole(g);
                                                    const rt = myRole?.role_type || myRole?.roleType || 'member';
                                                    return (
                                                        <div key={g.id} className="group-card" onClick={() => openGroup(g)}>
                                                            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.3rem'}}>
                                                                <span className={`group-type-badge ${g.type}`}>{g.type}</span>
                                                                <span style={{fontSize:'0.72rem', color: ROLE_COLORS[rt], fontWeight:700}}>{ROLE_LABELS[rt] || 'Member'}</span>
                                                            </div>
                                                            <div className="group-card-title">{g.title}</div>
                                                            <div className="group-card-meta">
                                                                <span>👥 {(g.members||[]).filter(m=>!m.banned_at).length}/{g.max_members}</span>
                                                                <span>💬 {(g.chats||[]).filter(c=>c.is_active).length} chats</span>
                                                                <span>📚 {(g.shelves||[]).length} shelves</span>
                                                            </div>
                                                            {g.description && <div className="group-card-desc">{g.description}</div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    {/* Public groups to join */}
                                    {publicOnly.length > 0 && (
                                        <div>
                                            <div className="groups-section-header">
                                                <div className="groups-section-title">Discover Public Groups</div>
                                            </div>
                                            <div className="groups-grid">
                                                {publicOnly.map(g => (
                                                    <div key={g.id} className="group-card">
                                                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.3rem'}}>
                                                            <span className="group-type-badge public">public</span>
                                                        </div>
                                                        <div className="group-card-title">{g.title}</div>
                                                        <div className="group-card-meta">
                                                            <span>👥 {(g.members||[]).filter(m=>!m.banned_at).length}/{g.max_members}</span>

                                <button className="book-detail-close" onClick={() => setSelectedFriend(null)}>×</button>
                                <div style={{width: '72px', height: '72px', borderRadius: '50%', background: '#3d2817', color: '#f5f0e8', fontSize: '2rem', fontWeight: '700', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '1.5rem auto 1rem'}}>
                                    {(selectedFriend.display_name || selectedFriend.username || '?').charAt(0).toUpperCase()}
                                </div>
                                <div style={{fontSize: '1.3rem', fontWeight: '700', color: '#3d2817'}}>{selectedFriend.display_name || selectedFriend.username}</div>
                                <div style={{color: '#8b6f47', marginBottom: '1.5rem'}}>@{selectedFriend.username}</div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '0.6rem', padding: '0 1rem 1.5rem'}}>
                                    <button className="friend-btn accept" style={{width: '100%', justifyContent: 'center'}} onClick={() => { setSelectedFriend(null); openMessagesWith(selectedFriend.id); }}>
                                        💬 Message
                                    </button>
                                    <button className="friend-btn" style={{width: '100%', justifyContent: 'center', background: '#e8f0e8', color: '#2d4a3e'}} onClick={() => { showMessage('View Library coming soon'); setSelectedFriend(null); }}>
                                        📚 View Library
                                    </button>
                                    <button className="friend-btn danger" style={{width: '100%', justifyContent: 'center'}} onClick={() => {
                                        const f = selectedFriend;
                                        setSelectedFriend(null);
                                        setConfirmAction({ title: 'Remove Friend', message: `Remove ${f.display_name || f.username} as a friend?`, onConfirm: () => removeFriend(f.id) });
                                        setShowConfirm(true);
                                    }}>
                                        Remove Friend
                                    </button>
                                    <button className="friend-btn" style={{width: '100%', justifyContent: 'center', background: '#e0d5c5', color: '#3d2817'}} onClick={() => {
                                        const f = selectedFriend;
                                        setSelectedFriend(null);
                                        setConfirmAction({ title: 'Block User', message: `Block ${f.display_name || f.username}? They won't be able to find or message you.`, onConfirm: () => blockUser(f.id) });
                                        setShowConfirm(true);
                                    }}>
                                        Block
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FIX #4: Custom Confirm Modal */}
                    {showConfirm && confirmAction && (
                        <div className="book-detail-overlay" onClick={() => setShowConfirm(false)}>
                            <div className="book-info-popup" onClick={(e) => e.stopPropagation()} style={{maxWidth: '400px'}}>
                                <button className="book-detail-close" onClick={() => setShowConfirm(false)}>×</button>
                                
                                <div className="book-info-content">
                                    <h2 style={{fontSize: '1.5rem', marginBottom: '1rem', color: '#3d2817'}}>
                                        {confirmAction.title}
                                    </h2>
                                    <p style={{fontSize: '1.1rem', marginBottom: '2rem', color: '#666'}}>
                                        {confirmAction.message}
                                    </p>
                                    
                                    <div className="book-info-actions">
                                        <div className="book-info-buttons">
                                            <button 
                                                className="btn-info btn-info-remove"
                                                onClick={() => {
                                                    confirmAction.onConfirm();
                                                    setShowConfirm(false);
                                                }}
                                            >
                                                ✓ Confirm
                                            </button>
                                            <button 
                                                className="btn-info"
                                                onClick={() => setShowConfirm(false)}
                                                style={{background: '#8b6f47'}}
                                            >
                                                Cancel
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Welcome Modal - shown once after sign-up */}
                    {showWelcome && (
                        <div className="book-detail-overlay" onClick={() => setShowWelcome(false)}>
                            <div className="book-info-popup" onClick={(e) => e.stopPropagation()} style={{maxWidth: '520px'}}>
                                <button className="book-detail-close" onClick={() => setShowWelcome(false)}>×</button>
                                <div className="book-info-content" style={{textAlign: 'center'}}>
                                    <div style={{fontSize: '2.5rem', marginBottom: '0.75rem'}}>📚</div>
                                    <h2 style={{fontFamily: "'Libre Baskerville', serif", fontSize: '1.6rem', color: '#3d2817', marginBottom: '1.25rem'}}>
                                        Welcome to YOUR Library
                                    </h2>
                                    <p style={{fontSize: '1rem', lineHeight: '1.7', color: '#555', marginBottom: '1.75rem'}}>
                                        Welcome to <strong>YOUR Library</strong>, but virtually. This project was inspired by my girlfriend who accumulated too many books over her years of reading. It became tedious to type all her books into some ordinary library app. So I made this one.
                                        <br/><br/>
                                        Type, scan with your phone, or use your favorite handheld scanner to enter all your books into YOUR Library and display them virtually for others to see. Interact with the books, move them from shelf to shelf, leave notes or a rating, or maybe just queue the book for your next read.
                                        <br/><br/>
                                        Ultimately, it's your library — so do whatever you want. Thank you for supporting the project. 🙏
                                    </p>
                                    <button
                                        className="btn-info btn-info-assign"
                                        onClick={() => setShowWelcome(false)}
                                        style={{width: '100%', justifyContent: 'center', fontSize: '1.05rem', padding: '0.85rem'}}
                                    >
                                        Let's build my library!
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
