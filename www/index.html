                        event: 'INSERT', schema: 'public', table: 'group_chat_messages',
                        filter: `chat_id=eq.${selectedGroupChat.id}`,
                    }, payload => {
                        const msg = payload.new;
                        if (!msg.is_deleted) {
                            setGroupMessages(prev =>
                                prev.some(m => m.id === msg.id) ? prev : [...prev, msg]
                            );
                        }
                    })
                    .subscribe();
                groupMsgSubRef.current = channel;
                return () => {
                    supabaseClient.removeChannel(channel);
                    groupMsgSubRef.current = null;
                };
            }, [groupsView, selectedGroupChat?.id]);

            // ── Send a group message ──────────────────────────────────────────
            const sendGroupMessage = async () => {
                const content = groupMsgInput.trim();
                if (!content || !selectedGroupChat || !currentUser) return;
                setGroupMsgInput('');
                const { error } = await supabaseClient
                    .from('group_chat_messages')
                    .insert({ chat_id: selectedGroupChat.id, sender_id: currentUser.id, content });
                if (error) {
                    setGroupMsgInput(content);
                    alert('Error sending message: ' + error.message);
                }
            };

            // ── Delete (soft) a message ───────────────────────────────────────
            const deleteGroupMessage = async (msgId) => {
                await supabaseClient
                    .from('group_chat_messages')
                    .update({ is_deleted: true, content: '' })
                    .eq('id', msgId);
                setGroupMessages(prev => prev.filter(m => m.id !== msgId));
            };

            // ── Rate a chat ───────────────────────────────────────────────────
            const rateChat = async (chat, rating) => {
                const { error } = await supabaseClient
                    .from('chat_ratings')
                    .upsert({ chat_id: chat.id, user_id: currentUser.id, rating }, { onConflict: 'chat_id,user_id' });
                if (error) { alert(error.message); return; }
                setMyRatings(r => ({ ...r, [chat.id]: rating }));
                // Refresh group to update displayed rating
                if (selectedGroup) await openGroup(selectedGroup);
            };

            // ─── Supabase book cache helpers ──────────────────────────────────
            // Looks up a single book by ISBN from the shared book_cache table.
            // Returns a normalised book object or null if not cached.
            const lookupIsbnInCache = async (isbn) => {
                try {
                    const { data } = await supabaseClient
                        .from('book_cache')
                        .select('*')
                        .eq('isbn', isbn)
                        .maybeSingle();
                    if (!data) return null;
                    return {
                        title: data.title,
                        author: data.author,
                        isbn: data.isbn,
                        cover: data.cover_url,
                        publishYear: data.publish_year,
                        publisher: data.publisher,
                        pageCount: data.page_count,
                        description: data.description || 'No description available.',
                        rating: data.rating || 0
                    };
                } catch { return null; }
            };

            // Saves a book to the shared book_cache table (upsert by ISBN).
            const saveIsbnToCache = async (book) => {
                if (!book?.isbn || book.isbn === 'Not Available' || book.isbn === 'N/A') return;
                try {
                    await supabaseClient.from('book_cache').upsert({
                        isbn: book.isbn,
                        title: book.title,
                        author: book.author,
                        cover_url: book.cover || null,
                        publish_year: book.publishYear || null,
                        publisher: book.publisher || null,
                        page_count: book.pageCount || null,
                        description: book.description || null,
                        rating: book.rating || null
                    }, { onConflict: 'isbn' });
                } catch (e) { console.warn('Cache save failed:', e); }
            };

            // Searches the shared book_cache by title or author text match.
            // Returns normalised book objects — used as the first lookup tier before hitting APIs.
            const searchBookCache = async (query) => {
                try {
                    const q = query.trim();
                    if (q.length < 2) return [];
                    const { data } = await supabaseClient
                        .from('book_cache')
                        .select('*')
                        .or(`title.ilike.%${q}%,author.ilike.%${q}%,description.ilike.%${q}%`)
                        .limit(30);
                    return (data || []).map(row => ({
                        title: row.title,
                        author: row.author,
                        isbn: row.isbn,
                        cover: row.cover_url,
                        publishYear: row.publish_year,
                        publisher: row.publisher,
                        pageCount: row.page_count,
                        description: row.description || 'No description available.',
                        rating: row.rating || 0
                    }));
                } catch { return []; }
            };

            // ─── Google Books fetch helper ─────────────────────────────────────

            const buildGbQuery = (q) => {
                if (isIsbnQuery(q)) return `isbn:${q.replace(/[-\s]/g, '')}`;
                // Colons are field-operator separators in Google Books query syntax
                // (e.g. intitle:, inauthor:). Sending "never stop: life, leadership"
                // raw causes the API to parse "stop" as an unknown field and return 0
                // results. Strip colons and commas so the query becomes plain text.
                return q.trim()
                    .replace(/:/g, ' ')
                    .replace(/,/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            };


            const parseGbItem = (item) => {
                const b = item.volumeInfo;
                // Google Books splits title and subtitle into separate fields.
                // Combine them so the full title is always shown.
                const fullTitle = b.subtitle
                    ? `${b.title}: ${b.subtitle}`
                    : (b.title || 'Unknown Title');
                return {
                    title: fullTitle,
                    author: b.authors?.[0] || 'Unknown Author',
                    isbn: b.industryIdentifiers?.find(i => i.type === 'ISBN_13')?.identifier ||
                          b.industryIdentifiers?.find(i => i.type === 'ISBN_10')?.identifier ||
                          'Not Available',
                    cover: b.imageLinks?.thumbnail?.replace('http:', 'https:') ||
                           b.imageLinks?.smallThumbnail?.replace('http:', 'https:') || null,
                    publishYear: b.publishedDate?.substring(0, 4) || null,
                    publisher: b.publisher || null,
                    pageCount: b.pageCount || null,
                    description: b.description || 'No description available.',
                    rating: b.averageRating || 0
                };
            };

            // Fetches books from Google Books API using the raw query — mirrors Google Books
            // web search, which queries title, author, and description simultaneously.
            const fetchFromGoogleBooks = async (query, fullSearch = false) => {
                const maxResults = fullSearch ? 200 : 40;
                const perPage = 40;
                const apiQuery = buildGbQuery(restoreContractions(query));

                const filterAndParse = (items) => (items || [])
                    .filter(item => {
                        const t = (item.volumeInfo.title || '').toLowerCase();
                        // Exclude magazines — but don't require printType==='BOOK' since
                        // many valid books have no printType set and would be wrongly filtered out.
                        return item.volumeInfo.printType !== 'MAGAZINE' &&
                               !t.includes('journal') && !t.includes('magazine') && !t.includes('newsletter');
                    })
                    .map(parseGbItem);

                let results = [];
                let startIndex = 0;

                while (results.length < maxResults) {
                    const res = await fetch(
                        `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(apiQuery)}&orderBy=relevance&maxResults=${perPage}&startIndex=${startIndex}${GBOOKS_KEY}`,
                        { referrerPolicy: 'strict-origin-when-cross-origin' }
                    );
                    if (!res.ok) break;
                    const data = await res.json();
                    if (!data.items?.length) break;
                    results = [...results, ...filterAndParse(data.items)];
                    if (!fullSearch || data.items.length < perPage) break;
                    startIndex += perPage;
                }

                return results;
            };

            // Search functions
            const handleSearchChange = (value) => {
                setSearchQuery(value);

                // Clear previous timer
                if (searchTimerRef.current) {
                    clearTimeout(searchTimerRef.current);
                }

                // If less than 3 characters, hide dropdown
                if (value.trim().length < 3) {
                    setShowSearchDropdown(false);
                    setSearchResults([]);
                    return;
                }

                // Debounce search - wait 1000ms after user stops typing
                searchTimerRef.current = setTimeout(() => {
                    searchBooks(value);
                }, 1000);
            };

            // ==========================================
            // SEARCH & BOOK API FUNCTIONS
            // ==========================================
            
            // Strip apostrophes, curly quotes, dashes and punctuation so
            // "cant" matches "Can't" and "Cant Hurt Me" matches "Can't Hurt Me"
            const normalizeText = (s) => (s || '')
                .toLowerCase()
                .replace(/[\u2018\u2019\u201A\u201B\u02BC\u02BB'`]/g, '') // curly + straight apostrophes → remove
                .replace(/[\u2010\u2011\u2012\u2013\u2014\u2015\-]/g, ' ') // dashes → space
                .replace(/[^\w\s]/g, ' ')  // remaining punctuation → space
                .replace(/\s+/g, ' ')
                .trim();

            // Score how relevant a book result is to the user's query.
            // Higher = better match. Used to re-rank API results client-side.
            const scoreBookRelevance = (book, query) => {
                const q      = normalizeText(query);
                const title  = normalizeText(book.title);
                const author = normalizeText(book.author);
                const tokens = q.split(/\s+/).filter(t => t.length > 1);
                let score = 0;

                // Title match tiers (all comparisons on normalized strings)
                if (title === q)              score += 200;
                else if (title.startsWith(q)) score += 160;
                else if (title.includes(q))   score += 80;

                // Token-based title scoring (handles "old man sea" → The Old Man and the Sea)
                if (tokens.length > 0) {
                    const hits = tokens.filter(t => title.includes(t)).length;
                    const ratio = hits / tokens.length;
                    score += ratio * 40;
                    // Extra boost when the title starts with ALL query tokens in order
                    if (title.startsWith(tokens[0]) && ratio === 1) score += 40;
                }

                // Author match
                if (author === q)              score += 50;
                else if (author.includes(q))   score += 30;
                else if (tokens.length > 0) {
                    const hits = tokens.filter(t => author.includes(t)).length;
                    score += (hits / tokens.length) * 20;
                }

                // Heavy penalty for summaries, abridgements, workbooks, etc.
                const rawTitle = (book.title || '').toLowerCase();
                const SUMMARY_WORDS = [
                    'summarized', 'summary', 'abridged', 'abridgement', 'condensed',
                    'workbook', 'study guide', 'key takeaways', 'for busy people',
                    'cliffsnotes', 'cliff notes', 'book review', 'chapter by chapter',
                    'quick read', 'speed read', 'shortcut edition', 'goldmine reads'
                ];
                if (SUMMARY_WORDS.some(kw => rawTitle.includes(kw))) score -= 50;

                // Hard penalty: if no query token appears anywhere in title or author,
                // this result is irrelevant regardless of quality signals (e.g. a popular
                // unrelated book shouldn't outrank the correct result on rating alone).
                if (tokens.length > 0) {
                    const anyMatch = tokens.some(t => title.includes(t) || author.includes(t));
                    if (!anyMatch) score -= 200;
                }

                // Quality signals — prefer well-catalogued books
                if (book.cover) score += 3;
                if (book.isbn && book.isbn !== 'Not Available') score += 3;
                if (book.pageCount > 0) score += 2;
                if (book.rating > 0) score += book.rating; // 1–5 point boost

                return score;
            };

            // Restore common missing apostrophes before sending to Google Books.
            // "cant hurt me" → "can't hurt me" so Google returns the right book.
            const restoreContractions = (q) => q
                .replace(/\bcant\b/gi,     "can't")
                .replace(/\bwont\b/gi,     "won't")
                .replace(/\bdont\b/gi,     "don't")
                .replace(/\bdoesnt\b/gi,   "doesn't")
                .replace(/\bisnt\b/gi,     "isn't")
                .replace(/\bwasnt\b/gi,    "wasn't")
                .replace(/\bwerent\b/gi,   "weren't")
                .replace(/\bhavent\b/gi,   "haven't")
                .replace(/\bhasnt\b/gi,    "hasn't")
                .replace(/\bwouldnt\b/gi,  "wouldn't")
                .replace(/\bcouldnt\b/gi,  "couldn't")
                .replace(/\bshouldnt\b/gi, "shouldn't")
                .replace(/\bthats\b/gi,    "that's")
                .replace(/\bwhats\b/gi,    "what's")
                .replace(/\bwhos\b/gi,     "who's")
                .replace(/\blets\b/gi,     "let's")
                .replace(/\bim\b/gi,       "I'm")
                .replace(/\bive\b/gi,      "I've")
                .replace(/\bId\b/g,        "I'd");

            // Returns true if the query looks like an ISBN-10 or ISBN-13
            const isIsbnQuery = (query) => {
                const cleaned = query.replace(/[-\s]/g, '');
                return /^\d{10}$/.test(cleaned) || /^\d{13}$/.test(cleaned);
            };

            const searchBooks = async (query, fullSearch = false) => {
                setSearchLoading(true);
                if (!fullSearch) setShowSearchDropdown(true);

                // v5 cache key — clears stale v4 entries that cached empty results from the
                // brief window when the printType==='BOOK' filter was too strict (before the
                // fix in dbf7e34 relaxed it to !=='MAGAZINE').
                const cacheKey = `search_v5_${query.trim().toLowerCase()}_${fullSearch}`;

                try {
                    // ── 1. Session cache (1-hour TTL) ─────────────────────────────────
                    const cached = sessionStorage.getItem(cacheKey);
                    if (cached) {
                        try {
                            const { results, ts } = JSON.parse(cached);
                            if (Date.now() - ts < 3_600_000) {
                                if (fullSearch) { setFullResults(results); setShowFullResults(true); }
                                else setSearchResults(results.slice(0, 5));
                                return;
                            }
                        } catch (_) {}
                    }

                    // ── 2. ISBN: exact Supabase lookup ────────────────────────────────
                    if (isIsbnQuery(query)) {
                        const cleanIsbn = query.replace(/[-\s]/g, '');
                        const fromCache = await lookupIsbnInCache(cleanIsbn);
                        if (fromCache) {
                            if (fullSearch) { setFullResults([fromCache]); setShowFullResults(true); }
                            else setSearchResults([fromCache]);
                            return;
                        }
                    }

                    // ── 3. Google Books — raw query, Google's native ranking ───────────
                    const results = await fetchFromGoogleBooks(query, fullSearch);

                    // ── 4. Cache results in Supabase for future ISBN/barcode lookups ───
                    results.forEach(b => saveIsbnToCache(b));

                    // ── 5. Store in session cache and display ─────────────────────────
                    // Only cache non-empty results — don't let a transient API failure
                    // poison the cache and return 0 results for the next hour.
                    if (results.length > 0) {
                        try {
                            sessionStorage.setItem(cacheKey, JSON.stringify({ results, ts: Date.now() }));
                        } catch (_) {}
                    }

                    if (fullSearch) { setFullResults(results); setShowFullResults(true); }
                    else setSearchResults(results.slice(0, 5));

                } catch (error) {
                    console.error('Search error:', error);
                    if (fullSearch) { setFullResults([]); setShowFullResults(true); }
                    else setSearchResults([]);
                } finally {
                    setSearchLoading(false);
                }
            };

            const openBookDetail = (book) => {
                setSelectedBook(book);
                // FIX: Don't close search - let user continue browsing
                setShowFullDescription(false);
            };

            const closeBookDetail = () => {
                setSelectedBook(null);
                setSelectedShelfForAdd('');
                setShowFullDescription(false);
            };

            // Opens the shelf/position picker modal (called from book detail popup)
            const addBookFromSearch = () => {
                if (!selectedBook) return;
                setPendingSearchBook(selectedBook);
                setAddToShelfId('');
                setAddToBoardIndex('');
                closeBookDetail();
                setShowAddShelfModal(true);
            };

            // Called when user taps Finish in the add-to-shelf modal
            const confirmAddBookFromSearch = async () => {
                if (!pendingSearchBook) return;

                try {
                    const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                    if (authError || !user) {
                        showMessage('❌ Session expired — please log in again');
                        return;
                    }

                    const targetShelfId = addToShelfId ? parseInt(addToShelfId) : null;
                    let boardIndex = null;
                    let position = null;

                    if (targetShelfId) {
                        boardIndex = addToBoardIndex !== '' ? (parseInt(addToBoardIndex) || 0) : 0;
                        position = findNextAvailablePosition(targetShelfId, boardIndex);
                        if (position === null) {
                            showMessage('❌ That shelf board is full — try another board');
                            return;
                        }
                    }

                    const { data, error } = await supabaseClient
                        .from('books')
                        .insert([{
                            user_id: user.id,
                            title: pendingSearchBook.title,
                            author: pendingSearchBook.author,
                            cover: pendingSearchBook.cover || null,
                            color: getRandomColor(),
                            shelf_id: targetShelfId,
                            board_index: boardIndex,
                            position: position
                        }])
                        .select();

                    if (error) throw error;

                    // Ensure book metadata is in cache for library popup enrichment
                    saveIsbnToCache(pendingSearchBook);

                    setBooks(prev => [...prev, data[0]]);
                    const shelfName = targetShelfId ? shelves.find(s => s.id === targetShelfId)?.name : null;
                    showMessage(`✅ Added "${data[0].title}"${shelfName ? ` to "${shelfName}"` : ' to Your Books'}!`);
                    setShowAddShelfModal(false);
                    setPendingSearchBook(null);
                    setAddToShelfId('');
                    setAddToBoardIndex('');

                } catch (error) {
                    console.error('Error adding book:', error);
                    showMessage('❌ Failed to add book — please check your connection and try again');
                }
            };

            // ─── 3D ROOM ─────────────────────────────────────────────

            const WOOD_COLORS = {
                oak: 0xc8902a, walnut: 0x5c3317, mahogany: 0x8b2500,
                cherry: 0xb5462b, maple: 0xe8c07a, pine: 0xf0d060
            };

            // Parse a CSS color / gradient string → 0xRRGGBB integer
            const cssColorToHex = (css) => {
                try {
                    const m = (css || '').match(/#([0-9a-f]{6})/i)
                           || (css || '').match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/i);
                    if (m && m[1] && m[1].length === 6) return parseInt(m[1], 16);
                    if (m && m[1]) return (parseInt(m[1]) << 16) | (parseInt(m[2]) << 8) | parseInt(m[3]);
                } catch(_) {}
                return 0x8b6f47;
            };

            // Make a canvas-texture label
            const makeLabel3D = (THREE, text) => {
                const cv = document.createElement('canvas');
                cv.width = 512; cv.height = 80;
                const ctx = cv.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0)';
                ctx.clearRect(0, 0, 512, 80);
                ctx.fillStyle = 'rgba(61,40,23,0.85)';
                if (ctx.roundRect) { ctx.roundRect(4, 4, 504, 72, 10); } else { ctx.rect(4, 4, 504, 72); }
                ctx.fill();
                ctx.fillStyle = '#f5e6d3';
                ctx.font = 'bold 36px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text.length > 18 ? text.slice(0, 17) + '…' : text, 256, 40);
                const tex = new THREE.CanvasTexture(cv);
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.28), mat);
                return mesh;
            };

            // Build one 3-D bookshelf group
            const buildShelfGroup = (THREE, shelf, shelfBooks) => {
                const group = new THREE.Group();
                const woodCol = WOOD_COLORS[shelf.wood_type] || 0xc8902a;
                const darkCol = Math.max(0, woodCol - 0x302010);
                const mat   = new THREE.MeshLambertMaterial({ color: woodCol });
                const dMat  = new THREE.MeshLambertMaterial({ color: darkCol });

                const boards  = Math.max(1, shelf.board_count || 3);
                const W = 2.0, D = 0.45;
                const H = 0.35 + boards * 0.72;  // total height scales with boards

                // Back panel
                const back = new THREE.Mesh(new THREE.BoxGeometry(W, H, 0.05), dMat);
                back.position.z = -(D / 2) + 0.025;
                group.add(back);

                // Left / right sides
                for (const sx of [-1, 1]) {
                    const side = new THREE.Mesh(new THREE.BoxGeometry(0.05, H, D), mat);
                    side.position.x = sx * (W / 2 - 0.025);
                    group.add(side);
                }

                // Top + bottom
                for (const sy of [H / 2, -H / 2]) {
                    const cap = new THREE.Mesh(new THREE.BoxGeometry(W, 0.05, D), mat);
                    cap.position.y = sy;
                    group.add(cap);
                }

                // Shelf boards + books
                const boardSpacing = (H - 0.1) / (boards + 1);
                for (let b = 0; b < boards; b++) {
                    const boardY = -H / 2 + 0.05 + (b + 1) * boardSpacing;
                    const board = new THREE.Mesh(new THREE.BoxGeometry(W - 0.1, 0.05, D), mat);
                    board.position.y = boardY;
                    group.add(board);

                    // Books sitting on this board
                    const booksHere = shelfBooks.filter(bk => bk.board_index === b);
                    let xCursor = -(W / 2) + 0.12;
                    booksHere.forEach(bk => {
                        const bW = 0.06 + Math.random() * 0.05;
                        const bH = 0.28 + Math.random() * 0.14;
                        const bD = D - 0.06;
                        const bcol = cssColorToHex(bk.color);
                        const bMat = new THREE.MeshLambertMaterial({ color: bcol });
                        const bookMesh = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, bD), bMat);
                        bookMesh.position.set(xCursor + bW / 2, boardY + 0.025 + bH / 2, 0);
                        group.add(bookMesh);
                        xCursor += bW + 0.008;
                        if (xCursor > W / 2 - 0.12) return; // shelf full
                    });
                }

                // Name label floating above
                const lbl = makeLabel3D(THREE, shelf.name);
                lbl.position.set(0, H / 2 + 0.22, 0.01);
                group.add(lbl);

                group.userData = { type: 'shelf', shelfId: shelf.id, name: shelf.name, H };
                return group;
            };

            // Scatter shelves into a sensible default layout if no saved positions
            const defaultPos = (index, total) => {
                const cols = Math.ceil(Math.sqrt(total + 1));
                const col  = index % cols;
                const row  = Math.floor(index / cols);
                return { x: (col - (cols - 1) / 2) * 3.0, z: (row - 0.5) * 3.0, rot: 0 };
            };

            // Full room init / rebuild
            const initRoom = (THREE, positions) => {
                const canvas    = roomCanvasRef.current;
                const container = roomContainerRef.current;
                if (!canvas || !container) return;

                // ── teardown old scene if any ──
                const old = roomStateRef.current;
                if (old) {
                    old.cleanup();
                }

                const W = container.clientWidth  || 800;
                const H = container.clientHeight || 500;

                // Scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a0f07);
                scene.fog = new THREE.Fog(0x1a0f07, 25, 55);

                // Perspective camera
                const pCam = new THREE.PerspectiveCamera(55, W / H, 0.1, 200);
                pCam.position.set(0, 7, 14);
                pCam.lookAt(0, 1, 0);

                // Orthographic camera (floor plan)
                const half = 10;
                const oCam = new THREE.OrthographicCamera(
                    -half * (W / H), half * (W / H), half, -half, 0.1, 200
                );
                oCam.position.set(0, 30, 0);
                oCam.lookAt(0, 0, 0);
                oCam.up.set(0, 0, -1); // prevent gimbal lock for top-down view

                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(W, H);
                renderer.shadowMap.enabled = true;

                // OrbitControls
                const controls = new THREE.OrbitControls(pCam, renderer.domElement);
                controls.enableDamping      = true;
                controls.dampingFactor      = 0.06;
                controls.screenSpacePanning = false; // restrict pan to XZ plane, prevents panning out of room
                controls.maxPolarAngle      = Math.PI / 2.05;
                controls.minDistance    = 3;
                controls.maxDistance    = 40;
                controls.target.set(0, 1, 0);
                controls.update();

                // ── Lighting ──
                scene.add(new THREE.AmbientLight(0xfff5e0, 0.55));
                const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
                sun.position.set(8, 18, 10);
                sun.castShadow = true;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far  = 80;
                sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
                sun.shadow.camera.right = sun.shadow.camera.top  =  20;
                scene.add(sun);
                const fill = new THREE.PointLight(0xffd9a0, 0.4, 30);
                fill.position.set(-5, 4, 5);
                scene.add(fill);

                // ── Floor ──
                const floorTex = (() => {
                    const fc = document.createElement('canvas');
                    fc.width = fc.height = 256;
                    const fx = fc.getContext('2d');
                    fx.fillStyle = '#8b5e3c';
                    fx.fillRect(0, 0, 256, 256);
                    // wood grain lines
                    fx.strokeStyle = 'rgba(0,0,0,0.18)';
                    fx.lineWidth = 1.5;
                    for (let i = 0; i < 256; i += 18) {
                        fx.beginPath(); fx.moveTo(i, 0); fx.lineTo(i + 8, 256); fx.stroke();
                    }
                    const t = new THREE.CanvasTexture(fc);
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                    t.repeat.set(8, 8);
                    return t;
                })();
                const floor = new THREE.Mesh(
                    new THREE.PlaneGeometry(40, 40),
                    new THREE.MeshLambertMaterial({ map: floorTex })
                );
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                floor.userData.type = 'floor';
                scene.add(floor);

                // Grid overlay
                const grid = new THREE.GridHelper(40, 40, 0x6b4226, 0x6b4226);
                grid.material.opacity = 0.25;
                grid.material.transparent = true;
                scene.add(grid);

                // ── Walls ──
                const wallMat = new THREE.MeshLambertMaterial({ color: 0xf5e6d3, side: THREE.BackSide });
                const wallH   = 12;
                const wallData = [
                    { pos: [0, wallH / 2, -20], ry: 0,           size: [40, wallH] },
                    { pos: [-20, wallH / 2, 0], ry: Math.PI / 2, size: [40, wallH] },
                    { pos: [20, wallH / 2, 0],  ry: -Math.PI / 2, size: [40, wallH] },
                ];
                wallData.forEach(({ pos, ry, size }) => {
                    const w = new THREE.Mesh(new THREE.PlaneGeometry(...size), wallMat);
                    w.position.set(...pos);
                    w.rotation.y = ry;
                    scene.add(w);
                });


                // ── Shelves ──
                const shelfMeshes = {};
                shelves.forEach((shelf, idx) => {
                    const saved = positions[shelf.id] || defaultPos(idx, shelves.length);
                    const shelfBooks = books.filter(b => b.shelf_id === shelf.id);
                    const grp = buildShelfGroup(THREE, shelf, shelfBooks);
                    grp.position.set(saved.x, grp.userData.H / 2, saved.z);
                    grp.rotation.y = saved.rot || 0;
                    grp.castShadow  = true;
                    scene.add(grp);
                    shelfMeshes[shelf.id] = grp;
                });

                // ── Raycasting / drag ──
                const raycaster = new THREE.Raycaster();
                const mouse     = new THREE.Vector2();
                let drag        = { active: false, shelf: null, startX: 0, startY: 0, moved: false };

                const toNDC = (e) => {
                    const r = canvas.getBoundingClientRect();
                    mouse.x =  ((e.clientX - r.left)  / r.width)  * 2 - 1;
                    mouse.y = -((e.clientY - r.top)   / r.height) * 2 + 1;
                };

                const getFloorHit = (e) => {
                    toNDC(e);
                    const cam = roomStateRef.current?.floorPlan ? oCam : pCam;
                    raycaster.setFromCamera(mouse, cam);
                    const hits = raycaster.intersectObject(floor);
                    return hits.length ? hits[0].point : null;
                };

                const getShelfHit = (e) => {
                    toNDC(e);
                    const cam = roomStateRef.current?.floorPlan ? oCam : pCam;
                    raycaster.setFromCamera(mouse, cam);
                    const objs = Object.values(shelfMeshes).flatMap(g => {
                        const hits = raycaster.intersectObject(g, true);
                        return hits.length ? [{ dist: hits[0].distance, grp: g }] : [];
                    });
                    if (!objs.length) return null;
                    objs.sort((a, b) => a.dist - b.dist);
                    return objs[0].grp;
                };

                canvas.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    const hit = getShelfHit(e);
                    if (hit) {
                        drag = { active: true, shelf: hit, startX: e.clientX, startY: e.clientY, moved: false };
                        controls.enabled = false;
                    }
                });

                const onDragMove = (e) => {
                    if (!drag.active) return;
                    const dx = e.clientX - drag.startX;
                    const dy = e.clientY - drag.startY;
                    if (!drag.moved && Math.hypot(dx, dy) > 6) drag.moved = true;
                    if (!drag.moved) return;

                    const pt = getFloorHit(e);
                    if (pt) {
                        drag.shelf.position.x = pt.x;
                        drag.shelf.position.z = pt.z;
                    }
                };

                const onDragUp = (e) => {
                    if (!drag.active || e.button !== 0) return;
                    controls.enabled = true;

                    if (drag.moved) {
                        // Save new position
                        const sid = drag.shelf.userData.shelfId;
                        const newPos = {
                            ...positions,
                            [sid]: { x: drag.shelf.position.x, z: drag.shelf.position.z, rot: drag.shelf.rotation.y }
                        };
                        setRoomPositions(newPos);
                        try { localStorage.setItem(`roomPos_${currentUser?.id}`, JSON.stringify(newPos)); } catch(_) {}
                        positions = newPos; // update local ref
                    } else {
                        // Click = select
                        const sid = drag.shelf?.userData?.shelfId || null;
                        setSelectedRoomShelf(prev => prev === sid ? null : sid);
                    }
                    drag = { active: false, shelf: null, startX: 0, startY: 0, moved: false };
                };

                window.addEventListener('mousemove', onDragMove);
                window.addEventListener('mouseup', onDragUp);

                // Rotate selected shelf with R key
                const onKey = (e) => {
                    if (e.key === 'r' || e.key === 'R') {
                        setSelectedRoomShelf(sid => {
                            if (sid && shelfMeshes[sid]) {
                                shelfMeshes[sid].rotation.y += Math.PI / 4;
                                const np = {
                                    ...positions,
                                    [sid]: { x: shelfMeshes[sid].position.x, z: shelfMeshes[sid].position.z, rot: shelfMeshes[sid].rotation.y }
                                };
                                setRoomPositions(np);
                                try { localStorage.setItem(`roomPos_${currentUser?.id}`, JSON.stringify(np)); } catch(_) {}
                                positions = np;
                            }
                            return sid;
                        });
                    }
                };
                window.addEventListener('keydown', onKey);

                // Resize
                const onResize = () => {
                    const nW = container.clientWidth  || 800;
                    const nH = container.clientHeight || 500;
                    pCam.aspect = nW / nH;
                    pCam.updateProjectionMatrix();
                    const half2 = 10;
                    oCam.left   = -half2 * (nW / nH);
                    oCam.right  =  half2 * (nW / nH);
                    oCam.updateProjectionMatrix();
                    renderer.setSize(nW, nH);
                };
                window.addEventListener('resize', onResize);

                // Animate
                let animId;
                const animate = () => {
                    animId = requestAnimationFrame(animate);
                    const st = roomStateRef.current;
                    if (!st) return;
                    const cam = st.floorPlan ? oCam : pCam;
                    controls.object = cam;
                    if (!drag.active) {
                        controls.update();
                        // clamp vertical pan so camera can't leave the room
                        if (!st.floorPlan) {
                            controls.target.y = Math.max(-1, Math.min(8, controls.target.y));
                        }
                    }
                    renderer.render(scene, cam);
                };
                animate();

                roomStateRef.current = {
                    scene, pCam, oCam, renderer, controls, shelfMeshes,
                    animId: 0, floorPlan: false,
                    cleanup: () => {
                        cancelAnimationFrame(animId);
                        window.removeEventListener('resize', onResize);
                        window.removeEventListener('keydown', onKey);
                        window.removeEventListener('mousemove', onDragMove);
                        window.removeEventListener('mouseup', onDragUp);
                        renderer.dispose();
                        controls.dispose();
                    }
                };
            };

            const toggleRoomView = () => {
                setRoomViewMode(prev => {
                    const next = prev === 'perspective' ? 'floorplan' : 'perspective';
                    if (roomStateRef.current) {
                        roomStateRef.current.floorPlan = (next === 'floorplan');
                        const st = roomStateRef.current;
                        if (next === 'floorplan') {
                            st.oCam.up.set(0, 0, -1);
                            st.oCam.position.set(0, 30, 0);
                            st.controls.target.set(0, 0, 0);
                            st.controls.enableRotate = false;
                            st.controls.enablePan    = true;
                        } else {
                            st.controls.enableRotate = true;
                            st.controls.maxPolarAngle = Math.PI / 2.05;
                        }
                        st.controls.update();
                    }
                    return next;
                });
            };

            // ─── END 3D ROOM ─────────────────────────────────────────

            // Fetch all recommendation sections — all powered by Google Books
            const fetchAllRecommendations = async (userBooks, userShelves) => {
                const cacheKey = 'recSections_v3';
                const cached = sessionStorage.getItem(cacheKey);
                if (cached) { try { setRecSections(JSON.parse(cached)); return; } catch(_) {} }
                if (sessionStorage.getItem('recs_fetching')) return;
                sessionStorage.setItem('recs_fetching', '1');
                setRecsLoading(true);

                const gbQuery = (q, n = 15) =>
                    fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&orderBy=relevance&maxResults=${n}&printType=books${GBOOKS_KEY}`,
                        { referrerPolicy: 'strict-origin-when-cross-origin' })
                        .then(r => r.ok ? r.json() : null)
                        .catch(() => null);

                const toBooks = (data) =>
                    (data?.items || []).filter(i => i.volumeInfo.imageLinks).map(parseGbItem).slice(0, 12);

                const sections = [];
                const promises = [];

                // 1. More by an author from the user's library
                if (userBooks.length > 0) {
                    const pick = userBooks[Math.floor(Math.random() * userBooks.length)];
                    promises.push(
                        gbQuery(`inauthor:"${pick.author}"`)
                            .then(data => {
                                const books = toBooks(data);
                                if (books.length >= 3) sections.push({ id: 'personal', title: `More by ${pick.author}`, label: '✨ Based on your library', books });
                            })
                    );
                }

                // 2. Genre based on a random shelf name
                if (userShelves.length > 0) {
                    const shelf = userShelves[Math.floor(Math.random() * userShelves.length)];
                    promises.push(
                        gbQuery(`subject:${shelf.name}`)
                            .then(data => {
                                const books = toBooks(data);
                                if (books.length >= 3) sections.push({ id: 'genre', title: `More ${shelf.name} Books`, label: '📚 From your shelves', books });
                            })
                    );
                }

                // 3. Discovery — a genre outside the user's shelves
                const allGenres = ['Science Fiction', 'Mystery', 'Romance', 'Thriller', 'Horror',
                    'Biography', 'History', 'Philosophy', 'Travel', 'Cooking', 'Poetry', 'Graphic Novel'];
                const shelfNames = userShelves.map(s => s.name.toLowerCase());
                const fresh = allGenres.filter(g => !shelfNames.some(s => s.includes(g.split(' ')[0].toLowerCase())));
                const discoverGenre = (fresh.length ? fresh : allGenres)[Math.floor(Math.random() * (fresh.length || allGenres.length))];
                promises.push(
                    gbQuery(`subject:${discoverGenre}`)
                        .then(data => {
                            const books = toBooks(data);
                            if (books.length >= 3) sections.push({ id: 'discovery', title: `Explore ${discoverGenre}`, label: '🔍 Outside your usual reads', books });
                        })
                );

                // 4. Popular right now (curated query, ordered by relevance)
                promises.push(
                    gbQuery('subject:fiction', 20)
                        .then(data => {
                            const books = toBooks(data);
                            if (books.length >= 3) sections.push({ id: 'trending', title: 'Popular Right Now', label: '🔥 Widely read', books });
                        })
                );

                // 5. New releases
                promises.push(
                    fetch(`https://www.googleapis.com/books/v1/volumes?q=subject:fiction&orderBy=newest&maxResults=15&printType=books${GBOOKS_KEY}`,
                        { referrerPolicy: 'strict-origin-when-cross-origin' })
                        .then(r => r.ok ? r.json() : null).catch(() => null)
                        .then(data => {
                            const books = toBooks(data);
                            if (books.length >= 3) sections.push({ id: 'new', title: 'New Releases', label: '📅 Just published', books });
                        })
                );

                // 6. Bestsellers
                promises.push(
                    gbQuery('subject:bestseller nonfiction')
                        .then(data => {
                            const books = toBooks(data);
                            if (books.length >= 3) sections.push({ id: 'bestsellers', title: 'Bestsellers', label: '⭐ Most popular', books });
                        })
                );

                await Promise.allSettled(promises);

                sessionStorage.removeItem('recs_fetching');
                setRecsLoading(false);

                const order = ['personal', 'genre', 'trending', 'new', 'bestsellers', 'discovery'];
                sections.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
                if (sections.length > 0) {
                    setRecSections(sections);
                    try { sessionStorage.setItem(cacheKey, JSON.stringify(sections)); } catch(_) {}
                }
            };

            // Load recommendations when user logs in
            useEffect(() => {
                if (currentUser && recSections.length === 0) {
                    fetchAllRecommendations(books, shelves);
                }
            }, [currentUser]);

            // Init 3D room when tab becomes active, cleanup when leaving
            useEffect(() => {
                if (activeTab !== 'room') {
                    // Cleanup
                    const st = roomStateRef.current;
                    if (st) {
                        cancelAnimationFrame(st.animId);
                        st.renderer.dispose();
                        st.cleanup?.();
                        roomStateRef.current = null;
                    }
                    return;
                }
                if (!window.THREE) return;
                // Load saved positions from localStorage
                let savedPos = {};
                try { savedPos = JSON.parse(localStorage.getItem(`roomPos_${currentUser?.id}`) || '{}'); } catch(_) {}
                setRoomPositions(savedPos);
                // Small delay so the canvas DOM node is rendered and sized
                const t = setTimeout(() => initRoom(window.THREE, savedPos), 80);
                return () => clearTimeout(t);
            }, [activeTab, shelves.length, books.length]);

            // Open book info popup
            // Enrich a stored library book with full metadata from book_cache by title match
            const enrichBookFromCache = async (book) => {
                if (book.isbn && book.description) return book; // already have what we need
                try {
                    const { data } = await supabaseClient
                        .from('book_cache')
                        .select('*')
                        .ilike('title', `${book.title.substring(0, 50)}%`)
                        .limit(1)
                        .maybeSingle();
                    if (data) {
                        return {
                            ...book,
                            isbn:        book.isbn        || data.isbn,
                            description: book.description || data.description,
                            publishYear: book.publishYear || data.publish_year,
                            pageCount:   book.pageCount   || data.page_count,
                            publisher:   book.publisher   || data.publisher,
                            cover:       book.cover       || data.cover_url,
                        };
                    }
                } catch (e) { /* silently ignore */ }
                return book;
            };

            const openBookInfo = async (book) => {
                setShowBookInfo(true);
                setSelectedShelfForAdd('');
                setBookInfoData(book); // show immediately
                const enriched = await enrichBookFromCache(book);
                setBookInfoData(enriched);
            };

            // Close book info popup
            const closeBookInfo = () => {
                setShowBookInfo(false);
                setBookInfoData(null);
                setSelectedShelfForAdd('');
            };

            // Remove book from library
            const removeBookFromLibrary = (bookId) => {
                const book = books.find(b => b.id === bookId);
                const title = book ? `"${book.title}"` : 'this book';
                setConfirmAction({
                    title: 'Remove Book',
                    message: `Remove ${title} from your library? This cannot be undone.`,
                    onConfirm: async () => {
                        try {
                            const { error } = await supabaseClient
                                .from('books')
                                .delete()
                                .eq('id', bookId);

                            if (error) throw error;

                            setBooks(books.filter(b => b.id !== bookId));
                            showMessage('Book removed from library');
                            closeBookInfo();

                        } catch (error) {
                            console.error('Error removing book:', error);
                            showMessage('❌ Failed to remove book');
                        }
                    }
                });
                setShowConfirm(true);
            };

            // Assign book to shelf from info popup
            const assignBookToShelf = async () => {
                if (!bookInfoData || !selectedShelfForAdd) return;

                const targetShelfId = parseInt(selectedShelfForAdd);
                const targetBoardIndex = selectedBoardForAdd !== '' ? parseInt(selectedBoardForAdd) : 0;
                const bookId = bookInfoData.id; // capture before async

                // Find next available position on the chosen board
                const nextPosition = findNextAvailablePosition(targetShelfId, targetBoardIndex);

                if (nextPosition === null) {
                    showMessage('❌ First shelf board is full! Try another board.');
                    return;
                }

                try {
                    const { error } = await supabaseClient
                        .from('books')
                        .update({ shelf_id: targetShelfId, board_index: targetBoardIndex, position: nextPosition })
                        .eq('id', bookId);
                    if (error) throw error;

                    // Re-fetch from Supabase so state always matches DB
                    await reloadBooks();

                    const shelfName = shelves.find(s => s.id === targetShelfId)?.name;
                    showMessage(`✅ Assigned to "${shelfName}" (Board 1, Pos ${nextPosition})`);
                    closeBookInfo();
                } catch (error) {
                    console.error('Error assigning book to shelf:', error);
                    showMessage('❌ Error assigning book to shelf');
                }
            };

            // BLUETOOTH SCANNER MODE - RAPID FIRE! 🔫
            const handleScannerInput = async (scannedIsbn) => {
                const cleanIsbn = scannedIsbn.replace(/[-\s]/g, '');

                if (!cleanIsbn) return;

                try {
                    // Check Supabase cache first — zero API calls if already cached
                    let bookData = await lookupIsbnInCache(cleanIsbn);

                    if (!bookData) {
                        // Not cached — fetch from Google Books
                        const response = await fetch(
                            `https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}${GBOOKS_KEY}`,
                            { referrerPolicy: 'strict-origin-when-cross-origin' }
                        );
                        if (response.ok) {
                            const data = await response.json();
                            if (data.items?.length) {
                                bookData = parseGbItem(data.items[0]);
                                bookData.isbn = cleanIsbn;
                                saveIsbnToCache(bookData);
                            }
                        }
                        // Fallback to OpenLibrary on 429 or no results
                        if (!bookData) {
                            const olRes = await fetch(
                                `https://openlibrary.org/api/books?bibkeys=ISBN:${cleanIsbn}&format=json&jscmd=data`
                            );
                            if (olRes.ok) {
                                const olData = await olRes.json();
                                const olBook = olData[`ISBN:${cleanIsbn}`];
                                if (olBook) {
                                    bookData = {
                                        title: olBook.title || 'Unknown Title',
                                        author: olBook.authors?.[0]?.name || 'Unknown Author',
                                        isbn: cleanIsbn,
                                        cover: olBook.cover?.medium || olBook.cover?.large || null,
                                    };
                                    saveIsbnToCache(bookData);
                                }
                            }
                        }
                    }

                    if (bookData) {
                        const book = bookData;

                        // DETAIL MODE - Show popup like original scanner
                        if (scanMode === 'detail') {
                            setScannedBookData({
                                title: book.title || 'Unknown Title',
                                author: book.author || 'Unknown Author',
                                isbn: cleanIsbn,
                                cover: book.cover || null
                            });
                            setShowScannedBookPopup(true);
                            setScannerInput('');
                            return;
                        }

                        // RAPID MODE - Auto-add with pre-set location
                        let targetShelfId = null;
                        let targetBoardIndex = null;
                        let targetPosition = null;

                        // Determine shelf
                        if (rapidScanShelf === 'random') {
                            if (shelves.length === 0) {
                                showMessage('❌ No shelves found. Add a shelf first.');
                                setScannerInput('');
                                return;
                            }
                            const randomShelf = shelves[Math.floor(Math.random() * shelves.length)];
                            targetShelfId = randomShelf.id;
                        } else {
                            targetShelfId = parseInt(rapidScanShelf);
                        }

                        // Determine board
                        const selectedShelf = shelves.find(s => String(s.id) === String(targetShelfId));
                        if (!selectedShelf) {
                            showMessage('❌ Error: Shelf not found');
                            setScannerInput('');
                            return;
                        }

                        if (rapidScanBoard === 'random') {
                            targetBoardIndex = Math.floor(Math.random() * (selectedShelf.board_count || selectedShelf.boardCount || 3));
                        } else {
                            targetBoardIndex = parseInt(rapidScanBoard);
                        }

                        // Determine position
                        if (rapidScanPosition === 'in-order') {
                            // Place books consecutively: 0, 10, 20, 30...
                            targetPosition = rapidScanCounter * BOOK_WIDTH;

                            // Check if we've filled this board
                            if (targetPosition > SHELF_WIDTH - BOOK_WIDTH) {
                                showMessage('⚠️ Board full! Select new location.');
                                setScannerInput('');
                                return;
                            }

                            // Check if position is occupied
                            if (!isPositionAvailable(targetShelfId, targetBoardIndex, targetPosition)) {
                                // Find next available
                                targetPosition = findNextAvailablePosition(targetShelfId, targetBoardIndex);
                                if (targetPosition === null) {
                                    showMessage('❌ Board full! Select new location.');
                                    setScannerInput('');
                                    return;
                                }
                            }

                            setRapidScanCounter(rapidScanCounter + 1); // Increment for next book
                        } else {
                            // Random position
                            const randomPos = Math.floor(Math.random() * (SHELF_WIDTH - BOOK_WIDTH + 1));
                            const snappedPos = Math.round(randomPos / 5) * 5; // Snap to 5s

                            if (isPositionAvailable(targetShelfId, targetBoardIndex, snappedPos)) {
                                targetPosition = snappedPos;
                            } else {
                                targetPosition = findNextAvailablePosition(targetShelfId, targetBoardIndex);
                                if (targetPosition === null) {
                                    showMessage('❌ Board full! Try another board.');
                                    setScannerInput('');
                                    return;
                                }
                            }
                        }

                        // Persist to Supabase
                        const { data: { user } } = await supabaseClient.auth.getUser();
                        if (!user) { showMessage('❌ Not logged in'); setScannerInput(''); return; }

                        const { data: inserted, error: insertError } = await supabaseClient
                            .from('books')
                            .insert([{
                                user_id: user.id,
                                title: book.title || 'Unknown Title',
                                author: book.author || 'Unknown Author',
                                cover: book.cover || null,
                                color: getRandomColor(),
                                shelf_id: targetShelfId,
                                board_index: targetBoardIndex,
                                position: targetPosition
                            }])
                            .select();

                        if (insertError) throw insertError;

                        setBooks(prev => [...prev, inserted[0]]);
                        showMessage(`✅ ${inserted[0].title} → ${selectedShelf.name} (Shelf ${targetBoardIndex + 1}, Pos ${targetPosition})`);

                        // Play success beep
                        const beep = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGa74+OlQRgWbbro8LRgFgY3kdXzx3koJlIx');
                        beep.play().catch(() => {});
                    } else {
                        showMessage(`❌ Book not found for ISBN: ${cleanIsbn}`);
                    }
                } catch (error) {
                    showMessage(`❌ Error scanning: ${error.message || cleanIsbn}`);
                    console.error('Scanner error:', error.message || error);
                }

                setScannerInput(''); // Clear for next scan
            };

            const getRandomColor = () => {
                const colors = [
                    'linear-gradient(90deg, #8b4513, #a0522d)',
                    'linear-gradient(90deg, #2c5f2d, #3d7c3f)',
                    'linear-gradient(90deg, #1e3a5f, #2c5282)',
                    'linear-gradient(90deg, #5c0a0a, #7a1515)',
                    'linear-gradient(90deg, #4a1c1c, #6b2828)',
                    'linear-gradient(90deg, #1a472a, #2d5f3d)',
                    'linear-gradient(90deg, #3d2817, #5c3d2e)'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            };

            // Get books for a specific shelf (derived from books array - SINGLE SOURCE OF TRUTH)
            const getBooksForShelf = (shelfId) => {
                return books.filter(book => book.shelf_id === shelfId);
            };
            
            // ==========================================
            // POSITIONING SYSTEM FUNCTIONS
            // ==========================================
            
            // Get books for a specific board with positions
            const getBooksForBoard = (shelfId, boardIndex) => {
                return books
                    .filter(book => String(book.shelf_id) === String(shelfId) && Number(book.board_index) === Number(boardIndex))
                    .sort((a, b) => (a.position || 0) - (b.position || 0)); // Sort by position
            };
            
            // Check if a position is available on a board
            const isPositionAvailable = (shelfId, boardIndex, position, excludeBookId = null) => {
                const booksOnBoard = getBooksForBoard(shelfId, boardIndex)
                    .filter(book => book.id !== excludeBookId); // Exclude the book being moved
                
                const newBookStart = position;
                const newBookEnd = position + BOOK_WIDTH - 1; // Book occupies position to position+9
                
                // Check if ANY of the 10 positions overlap with existing books
                for (let book of booksOnBoard) {
                    const bookStart = book.position !== null ? book.position : 0;
                    const bookEnd = bookStart + BOOK_WIDTH - 1;
                    
                    // Check for ANY overlap
                    // Two ranges overlap if: NOT (end1 < start2 OR start1 > end2)
                    // Simplified: (start1 <= end2 AND end1 >= start2)
                    if (newBookStart <= bookEnd && newBookEnd >= bookStart) {
                        return false; // Collision!
                    }
                }
                
                return true; // No collision
            };
            
            // Find next available position on a board
            const findNextAvailablePosition = (shelfId, boardIndex, excludeIds = []) => {
                const booksOnBoard = getBooksForBoard(shelfId, boardIndex)
                    .filter(b => !excludeIds.includes(b.id));

                if (booksOnBoard.length === 0) return 0;

                // Try placing after the last book (step in BOOK_WIDTH increments to stay aligned)
                const lastBook = booksOnBoard[booksOnBoard.length - 1];
                const afterLast = (lastBook.position || 0) + BOOK_WIDTH;
                if (afterLast + BOOK_WIDTH <= SHELF_WIDTH) return afterLast;

                // Scan for gaps, stepping by BOOK_WIDTH so positions stay aligned
                for (let pos = 0; pos <= SHELF_WIDTH - BOOK_WIDTH; pos += BOOK_WIDTH) {
                    if (isPositionAvailable(shelfId, boardIndex, pos, excludeIds[0] ?? null)) {
                        return pos;
                    }
                }

                return null; // Board is full
            };
            
            // Calculate drop position from mouse X coordinate WITH SNAPPING
            const calculateDropPosition = (e, boardElement) => {
                const rect = boardElement.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                
                // Account for padding (1rem = ~16px on each side)
                const paddingLeft = 16; // 1rem left padding
                const adjustedMouseX = mouseX - paddingLeft;
                
                // Convert mouse pixel to position units
                // DYNAMIC: Calculate based on actual board width
                // Board content width varies by breakpoint (830px, 650px, etc)
                const boardContentWidth = rect.width - 32; // Board width minus padding (16px each side)
                const pixelsPerPosition = boardContentWidth / SHELF_WIDTH; // e.g., 830/200 = 4.15px per position
                const exactPosition = adjustedMouseX / pixelsPerPosition;
                
                // SNAP to nearest 5-position interval
                const snapInterval = 5;
                const snappedPosition = Math.round(exactPosition / snapInterval) * snapInterval;
                
                // Clamp to valid range (0 to 190)
                return Math.max(0, Math.min(SHELF_WIDTH - BOOK_WIDTH, snappedPosition));
            };
            
            // Find nearest available snap position
            const findNearestAvailablePosition = (shelfId, boardIndex, targetPosition, excludeBookId = null) => {
                // Try the target position first
                if (isPositionAvailable(shelfId, boardIndex, targetPosition, excludeBookId)) {
                    return targetPosition;
                }
                
                // Search outward from target position in 5-position increments
                const snapInterval = 5;
                for (let offset = snapInterval; offset <= SHELF_WIDTH; offset += snapInterval) {
                    // Try right
                    const rightPos = targetPosition + offset;
                    if (rightPos <= SHELF_WIDTH - BOOK_WIDTH && isPositionAvailable(shelfId, boardIndex, rightPos, excludeBookId)) {
                        return rightPos;
                    }
                    
                    // Try left
                    const leftPos = targetPosition - offset;
                    if (leftPos >= 0 && isPositionAvailable(shelfId, boardIndex, leftPos, excludeBookId)) {
                        return leftPos;
                    }
                }
                
                return null; // No position found
            };

            // ==========================================
            // SHELF MANAGEMENT FUNCTIONS

            const addShelf = async () => {

            // Drag and drop handlers - FIXED
            const handleDragStart = (e, book, fromShelfId) => {
                setDraggedBook(book);

                e.currentTarget.style.opacity = '0.5';

            const handleDragOver = (e, shelfId, boardIndex) => {
                e.preventDefault();
                e.stopPropagation();
                e.dataTransfer.dropEffect = 'move';

                // Calculate where book would snap if dropped here
                if (draggedBook && e.currentTarget.classList.contains('shelf-board')) {
                    const targetPosition = calculateDropPosition(e, e.currentTarget);
                    const snapPosition = findNearestAvailablePosition(shelfId, boardIndex, targetPosition, draggedBook.id);
                    const boardKey = `${shelfId}-${boardIndex}`;

                    // Throttle React state updates to animation frames to keep shadow in sync
                    if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
                    rafIdRef.current = requestAnimationFrame(() => {
                        setSnapPreviewPosition(snapPosition);
                        setSnapPreviewBoard(boardKey);

                }
            };
            
            const handleDragEnter = (e, shelfId) => {
                e.preventDefault();
                setDropTargetShelf(shelfId);

            const handleDragLeave = (e) => {

            const handleDrop = async (e, toShelfId, toBoardIndex) => {
                e.preventDefault();
                e.stopPropagation();
                
                if (!draggedBook) return;
                
                // Calculate drop position (snapped)
                const boardElement = e.currentTarget;
                const targetPosition = calculateDropPosition(e, boardElement);
                
                // Find nearest available position (will snap to target if available)
                const finalPosition = findNearestAvailablePosition(toShelfId, toBoardIndex, targetPosition, draggedBook.id);
                
                if (finalPosition === null) {
                    showMessage('❌ This shelf board is full!');
                    setDraggedBook(null);
                    setDropTargetShelf(null);

                try {

                        .from('books')
                        .update({

                    // Update local state
                    setBooks(books.map(b =>
                        b.id === draggedBook.id

                            : b
                    ));
                    
                    const shelfName = shelves.find(s => s.id === toShelfId)?.name;
                    const snapped = finalPosition !== targetPosition;
                    const message = snapped 
                        ? `📚 Snapped "${draggedBook.title}" to nearest spot (Pos ${finalPosition})`
                        : `📚 Moved "${draggedBook.title}" to ${shelfName} (Pos ${finalPosition})`;
                    showMessage(message);
                } catch (error) {
                    console.error('Error updating book position:', error);
                    showMessage('❌ Failed to move book');
                }
                
                setDraggedBook(null);
                setDropTargetShelf(null);
            };

            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                setDraggedBook(null);
                setDropTargetShelf(null);
                setSnapPreviewPosition(null);
                setSnapPreviewBoard(null);
            };

            // Touch drag handlers for mobile
            const handleTouchStart = (e, book) => {
                e.currentTarget.style.opacity = '0.5';
                touchDragRef.current = { book, moved: false };
                setDraggedBook(book);
            };

            const handleTouchMove = (e) => {
                if (!touchDragRef.current) return;
                touchDragRef.current.moved = true;
                e.preventDefault();

                const touch = e.touches[0];
                // Find the shelf-board element under the touch point
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const boardEl = el?.closest?.('.shelf-board');
                if (!boardEl) {
                    setSnapPreviewPosition(null);
                    setSnapPreviewBoard(null);
                    return;
                }

                // Read shelf/board from data attributes set on the board element
                const shelfId = parseInt(boardEl.dataset.shelfId);
                const boardIndex = parseInt(boardEl.dataset.boardIndex);
                if (isNaN(shelfId) || isNaN(boardIndex)) return;

                const fakeEvent = { clientX: touch.clientX };
                const targetPosition = calculateDropPosition(fakeEvent, boardEl);
                const snapPosition = findNearestAvailablePosition(shelfId, boardIndex, targetPosition, touchDragRef.current.book.id);
                setSnapPreviewPosition(snapPosition);
                setSnapPreviewBoard(`${shelfId}-${boardIndex}`);
                setDropTargetShelf(shelfId);
            };

            const handleTouchEnd = async (e, bookEl) => {
                if (!touchDragRef.current) return;
                const { book, moved } = touchDragRef.current;
                touchDragRef.current = null;

                if (bookEl) bookEl.style.opacity = '1';

                if (!moved) {
                    // Treat as a tap — open popup
                    setDraggedBook(null);
                    setSnapPreviewPosition(null);
                    setSnapPreviewBoard(null);
                    setDropTargetShelf(null);
                    return;
                }

                e.preventDefault();
                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const boardEl = el?.closest?.('.shelf-board');

                setDraggedBook(null);
                setSnapPreviewPosition(null);
                setSnapPreviewBoard(null);
                setDropTargetShelf(null);

                if (!boardEl) return;

                const toShelfId = parseInt(boardEl.dataset.shelfId);
                const toBoardIndex = parseInt(boardEl.dataset.boardIndex);
                if (isNaN(toShelfId) || isNaN(toBoardIndex)) return;

                const fakeEvent = { clientX: touch.clientX };
                const targetPosition = calculateDropPosition(fakeEvent, boardEl);
                const finalPosition = findNearestAvailablePosition(toShelfId, toBoardIndex, targetPosition, book.id);

                if (finalPosition === null) {
                    showMessage('❌ This shelf board is full!');
                    return;
                }

                try {
                    const { error } = await supabaseClient
                        .from('books')
                        .update({ shelf_id: toShelfId, board_index: toBoardIndex, position: finalPosition })
                        .eq('id', book.id);
                    if (error) throw error;
                    setBooks(prev => prev.map(b =>
                        b.id === book.id
                            ? { ...b, shelf_id: toShelfId, board_index: toBoardIndex, position: finalPosition }
                            : b
                    ));
                    const shelfName = shelves.find(s => s.id === toShelfId)?.name;
                    showMessage(`📚 Moved "${book.title}" to ${shelfName}`);
                } catch (err) {
                    console.error('Touch drop error:', err);
                    showMessage('❌ Failed to move book');
                }
            };

            const deleteShelf = async (shelfId) => {
                const shelf = shelves.find(s => s.id === shelfId);
                const shelfName = shelf ? shelf.name : 'this shelf';
                
                setConfirmAction({
                    title: 'Delete Shelf',

            // Open book selector for shelf

            // Toggle book selection
            const toggleBookSelection = (bookId) => {

                } else {
                    setSelectedBooksToAdd([...selectedBooksToAdd, bookId]);
                }
            };

            // Add selected books to shelf
            const addSelectedBooksToShelf = async () => {
                if (selectedBooksToAdd.length === 0) return;

                const targetBoardIndex = 0;
                const targetShelf = targetShelfForSelector;
                const booksToAdd = [...selectedBooksToAdd];

                // Build a virtual occupied-position set, excluding the books being moved
                // so their current positions don't block placement of themselves.
                const takenPositions = new Set(
                    getBooksForBoard(targetShelf, targetBoardIndex)
                        .filter(b => !booksToAdd.includes(b.id))
                        .flatMap(b => Array.from({ length: BOOK_WIDTH }, (_, i) => (b.position || 0) + i))
                );

                // Find next free aligned slot, marking it taken as we go
                const findNextFreeSlot = () => {
                    for (let pos = 0; pos <= SHELF_WIDTH - BOOK_WIDTH; pos += BOOK_WIDTH) {
                        const blocked = Array.from({ length: BOOK_WIDTH }, (_, i) => pos + i).some(p => takenPositions.has(p));
                        if (!blocked) return pos;
                    }
                    return null;
                };

                // Assign a position to each book in sequence
                const assignments = [];
                for (const bookId of booksToAdd) {
                    const pos = findNextFreeSlot();
                    if (pos === null) {
                        showMessage('❌ Shelf board is full — not all books could be added');
                        break;
                    }
                    assignments.push({ id: bookId, shelf_id: targetShelf, board_index: targetBoardIndex, position: pos });
                    // Mark those slots taken so the next book doesn't collide
                    for (let i = 0; i < BOOK_WIDTH; i++) takenPositions.add(pos + i);
                }

                if (assignments.length === 0) return;

                try {
                    await Promise.all(assignments.map(async ({ id, shelf_id, board_index, position }) => {
                        const { error } = await supabaseClient
                            .from('books')
                            .update({ shelf_id, board_index, position })
                            .eq('id', id);
                        if (error) throw error;
                    }));

                    await reloadBooks();
                    const shelfName = shelves.find(s => s.id === targetShelf)?.name;
                    showMessage(`✅ Added ${assignments.length} book(s) to "${shelfName}"`);
                    closeBookSelector();

            // Open shelf book popup
